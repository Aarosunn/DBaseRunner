apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-db
  template:
    metadata:
      labels:
        app: neo4j-db
    spec:
      containers:
        - name: neo4j
          image: neo4j:5
          ports:
            - containerPort: 7474
            - containerPort: 7687
          env:
            - name: NEO4J_AUTH
              value: neo4j/neo4j_password
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-db
spec:
  type: ClusterIP
  selector:
    app: neo4j-db
  ports:
    - name: http
      port: 7474
      targetPort: 7474
    - name: bolt
      port: 7687
      targetPort: 7687
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-app
  template:
    metadata:
      labels:
        app: neo4j-app
    spec:
      containers:
        - name: neo4j-app
          image: dbaserunner/neo4j-app:latest
          ports:
            - containerPort: 8000
          env:
            - name: NEO4J_URI
              value: bolt://neo4j-db:7687
            - name: NEO4J_USER
              value: neo4j
            - name: NEO4J_PASSWORD
              value: neo4j_password
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j-app
spec:
  type: ClusterIP
  selector:
    app: neo4j-app
  ports:
    - name: http
      port: 8000
      targetPort: 8000
